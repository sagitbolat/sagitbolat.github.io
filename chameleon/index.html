<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>The Chameleon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setup" class="screen active">
    <div class="screen-inner">
      <div class="logo">
        <span class="logo-icon">🦎</span>
        <h1>The Chameleon</h1>
        <p class="tagline">Who's blending in?</p>
      </div>

      <div class="card">
        <div class="field-group">
          <label for="playerCount">Players</label>
          <div class="stepper">
            <button class="stepper-btn" onclick="adjustPlayers(-1)">−</button>
            <span id="playerCountDisplay">4</span>
            <button class="stepper-btn" onclick="adjustPlayers(1)">+</button>
          </div>
          <input type="hidden" id="playerCount" value="4" />
        </div>

        <div class="field-group">
          <label for="categorySelect">Category</label>
          <div class="select-wrap">
            <select id="categorySelect"></select>
            <span class="select-arrow">▾</span>
          </div>
        </div>

        <div class="field-group toggle-group">
          <label for="enableSnitch">Snitch Role</label>
          <label class="toggle">
            <input type="checkbox" id="enableSnitch" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <button class="btn-primary" onclick="startGame()">Start Game</button>
      </div>

      <details class="collapsible">
        <summary>➕ Add Custom Category</summary>
        <div class="card collapsible-card">
          <div class="field-group">
            <label for="customTitle">Category Name</label>
            <input type="text" id="customTitle" placeholder="e.g. Desserts" class="text-input" />
          </div>
          <div class="field-group">
            <label>Words <span class="hint">(16 required)</span></label>
            <div class="word-grid-inputs" id="wordInputs">
              <!-- generated by JS -->
            </div>
          </div>
          <div id="wordCounter" class="word-counter">0 / 16 filled</div>
          <button class="btn-secondary" onclick="addCustomCategory()">Add Category</button>
        </div>
      </details>

      <details class="collapsible">
        <summary>🗑️ Delete Custom Category</summary>
        <div class="card collapsible-card">
          <div class="field-group">
            <label for="deleteSelect">Select Category</label>
            <div class="select-wrap">
              <select id="deleteSelect"></select>
              <span class="select-arrow">▾</span>
            </div>
          </div>
          <button class="btn-danger" onclick="deleteCustomCategory()">Delete</button>
        </div>
      </details>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="screen">
    <div class="screen-inner game-inner">
      <div class="player-header">
        <div class="player-pill">
          <span id="playerLabel">Player 1</span>
          <span id="playerProgress"></span>
        </div>
      </div>

      <div class="reveal-area">
        <div id="revealBox" class="reveal-box">
          <div class="reveal-prompt">
            <div class="eye-icon">👁️</div>
            <p>Hold the button to see your role</p>
          </div>
        </div>
      </div>

      <div class="game-actions">
        <button id="revealBtn" onclick="toggleInfo()">
          <span class="btn-icon">👁</span> <span id="revealBtnText">Tap to Reveal</span>
        </button>
        <button class="btn-next" onclick="nextPlayer()">
          Next Player →
        </button>
      </div>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="end" class="screen">
    <div class="screen-inner"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
